services:
  plantuml-server:
    image: plantuml/plantuml-server:jetty
    container_name: plantuml-mode-test-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
